<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select a Recipe — MealMCP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <script id="view-data" type="application/json">{}</script>
  <script src="shared.js"></script>

  <div id="root"></div>

  <script>
    const { useState, useMemo } = React;

    /* ── Category Pill ──────────────────────────────────────────────── */

    function CategoryPill({ category }) {
      if (!category) return null;

      const colorMap = {
        main: theme.colors.primary,
        side: theme.colors.success,
        snack: theme.colors.warning,
        dessert: theme.colors.fat,
        breakfast: theme.colors.carbs,
      };
      const color = colorMap[category] || theme.colors.textMuted;

      return e("span", {
        style: {
          fontSize: "0.7rem",
          fontWeight: 600,
          textTransform: "uppercase",
          letterSpacing: "0.05em",
          color,
          background: `${color}18`,
          padding: `2px ${theme.spacing.sm}`,
          borderRadius: theme.radius.full,
        },
      }, category);
    }

    /* ── Time Badge ─────────────────────────────────────────────────── */

    function TimeBadge({ prepMinutes, cookMinutes }) {
      const total = (prepMinutes || 0) + (cookMinutes || 0);
      if (total === 0) return null;

      return e("span", {
        style: {
          fontSize: "0.75rem",
          color: theme.colors.textMuted,
          display: "inline-flex",
          alignItems: "center",
          gap: "4px",
        },
      }, "\u23F1 ", `${total} min`);
    }

    /* ── Recipe Card ────────────────────────────────────────────────── */

    function RecipeCard({ recipe, isSelected, onSelect }) {
      return e(Card, {
        onClick: () => onSelect(recipe.id),
        style: {
          cursor: "pointer",
          borderColor: isSelected ? theme.colors.primary : theme.colors.border,
          background: isSelected ? theme.colors.primaryBg : theme.colors.surface,
          transition: "all 0.15s ease",
        },
      },
        // Header row
        e("div", {
          style: {
            display: "flex",
            justifyContent: "space-between",
            alignItems: "flex-start",
            marginBottom: theme.spacing.sm,
          },
        },
          e("div", null,
            e("h3", {
              style: {
                fontSize: "0.95rem",
                fontWeight: 600,
                color: theme.colors.text,
                marginBottom: "4px",
              },
            }, recipe.name),
            e("div", {
              style: { display: "flex", gap: theme.spacing.sm, alignItems: "center" },
            },
              e(CategoryPill, { category: recipe.category }),
              e(TimeBadge, {
                prepMinutes: recipe.prep_minutes,
                cookMinutes: recipe.cook_minutes,
              })
            )
          ),
          isSelected && e("div", {
            style: {
              width: 24,
              height: 24,
              borderRadius: "50%",
              background: theme.colors.primary,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              fontSize: "14px",
              color: "#fff",
              flexShrink: 0,
            },
          }, "\u2713")
        ),

        // Tags
        recipe.tags && recipe.tags.length > 0 && e("div", {
          style: {
            display: "flex",
            gap: "4px",
            flexWrap: "wrap",
            marginBottom: theme.spacing.sm,
          },
        },
          ...recipe.tags.slice(0, 4).map((tag) =>
            e("span", {
              key: tag,
              style: {
                fontSize: "0.7rem",
                color: theme.colors.textDim,
                background: theme.colors.surfaceHover,
                padding: `2px ${theme.spacing.xs}`,
                borderRadius: theme.radius.sm,
              },
            }, tag)
          )
        ),

        // Macro badges
        recipe.macro_summary && e(MacroBadgeRow, {
          macros: recipe.macro_summary,
          style: { marginTop: theme.spacing.sm },
        })
      );
    }

    /* ── Filter Bar ─────────────────────────────────────────────────── */

    function FilterBar({ categories, selectedCategory, onCategoryChange }) {
      return e("div", {
        style: {
          display: "flex",
          gap: theme.spacing.sm,
          marginBottom: theme.spacing.lg,
          flexWrap: "wrap",
        },
      },
        e(Button, {
          variant: !selectedCategory ? "primary" : "secondary",
          onClick: () => onCategoryChange(null),
          style: { padding: `6px ${theme.spacing.md}`, fontSize: "0.8rem" },
        }, "All"),
        ...categories.map((cat) =>
          e(Button, {
            key: cat,
            variant: selectedCategory === cat ? "primary" : "secondary",
            onClick: () => onCategoryChange(cat),
            style: { padding: `6px ${theme.spacing.md}`, fontSize: "0.8rem" },
          }, cat.charAt(0).toUpperCase() + cat.slice(1))
        )
      );
    }

    /* ── Main App ───────────────────────────────────────────────────── */

    function RecipeSelectorApp() {
      const data = getViewData();
      const recipes = data.recipes || [];

      const [selectedId, setSelectedId] = useState(null);
      const [categoryFilter, setCategoryFilter] = useState(null);

      const categories = useMemo(() => {
        const cats = new Set(recipes.map((r) => r.category).filter(Boolean));
        return [...cats].sort();
      }, [recipes]);

      const filtered = useMemo(() => {
        if (!categoryFilter) return recipes;
        return recipes.filter((r) => r.category === categoryFilter);
      }, [recipes, categoryFilter]);

      const handleConfirm = () => {
        if (!selectedId) return;
        const recipe = recipes.find((r) => r.id === selectedId);
        sendResult({
          action: "select_recipe",
          recipe_id: selectedId,
          recipe_name: recipe ? recipe.name : "",
        });
      };

      return e("div", { className: "view-container" },
        e("style", null, sharedCSS),

        e("div", { className: "view-header" },
          e("h1", null, "Select a Recipe"),
          e("p", null, `${recipes.length} recipe${recipes.length !== 1 ? "s" : ""} found — tap to select.`)
        ),

        categories.length > 1 && e(FilterBar, {
          categories,
          selectedCategory: categoryFilter,
          onCategoryChange: setCategoryFilter,
        }),

        // Recipe grid
        e("div", {
          style: {
            display: "grid",
            gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))",
            gap: theme.spacing.md,
          },
        },
          ...filtered.map((recipe) =>
            e(RecipeCard, {
              key: recipe.id,
              recipe,
              isSelected: selectedId === recipe.id,
              onSelect: setSelectedId,
            })
          )
        ),

        // Empty state
        filtered.length === 0 && e("div", {
          style: {
            textAlign: "center",
            padding: theme.spacing.xl,
            color: theme.colors.textMuted,
          },
        }, "No recipes match the current filter."),

        // Action bar
        e("div", {
          style: {
            marginTop: theme.spacing.xl,
            display: "flex",
            justifyContent: "flex-end",
            gap: theme.spacing.md,
            position: "sticky",
            bottom: theme.spacing.lg,
            background: theme.colors.bg,
            padding: `${theme.spacing.md} 0`,
          },
        },
          e(Button, { variant: "secondary", onClick: () => setSelectedId(null) }, "Clear"),
          e(Button, {
            onClick: handleConfirm,
            disabled: !selectedId,
          }, "View Recipe Details")
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      e(RecipeSelectorApp)
    );
  </script>
</body>
</html>

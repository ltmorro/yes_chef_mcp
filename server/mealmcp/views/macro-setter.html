<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Macro Targets — MealMCP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <script id="view-data" type="application/json">{}</script>
  <script src="shared.js"></script>

  <div id="root"></div>

  <script>
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Pie Chart (Canvas) ─────────────────────────────────────────── */

    function MacroPieChart({ protein, carbs, fat }) {
      const canvasRef = useRef(null);
      const total = protein + carbs + fat;

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const size = canvas.width;
        const cx = size / 2;
        const cy = size / 2;
        const r = size / 2 - 12;

        ctx.clearRect(0, 0, size, size);

        if (total === 0) {
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.strokeStyle = theme.colors.border;
          ctx.lineWidth = 24;
          ctx.stroke();
          return;
        }

        const slices = [
          { value: protein * 4, color: theme.colors.protein, label: "Protein" },
          { value: carbs * 4, color: theme.colors.carbs, label: "Carbs" },
          { value: fat * 9, color: theme.colors.fat, label: "Fat" },
        ];
        const totalCal = slices.reduce((s, sl) => s + sl.value, 0);
        let startAngle = -Math.PI / 2;

        slices.forEach((slice) => {
          const angle = (slice.value / totalCal) * Math.PI * 2;
          ctx.beginPath();
          ctx.arc(cx, cy, r, startAngle, startAngle + angle);
          ctx.strokeStyle = slice.color;
          ctx.lineWidth = 24;
          ctx.lineCap = "butt";
          ctx.stroke();
          startAngle += angle;
        });

        // Center text
        const calories = Math.round(totalCal);
        ctx.fillStyle = theme.colors.text;
        ctx.font = `700 28px ${theme.font.sans}`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(calories, cx, cy - 8);
        ctx.fillStyle = theme.colors.textMuted;
        ctx.font = `500 12px ${theme.font.sans}`;
        ctx.fillText("calories", cx, cy + 16);
      }, [protein, carbs, fat]);

      return e("canvas", {
        ref: canvasRef,
        width: 200,
        height: 200,
        style: { display: "block", margin: "0 auto" },
      });
    }

    /* ── Macro Slider ───────────────────────────────────────────────── */

    function MacroSlider({ label, value, min, max, step, color, unit, calPer, onChange }) {
      const calContribution = Math.round(value * calPer);

      return e("div", { style: { marginBottom: theme.spacing.lg } },
        e("div", {
          style: {
            display: "flex",
            justifyContent: "space-between",
            alignItems: "baseline",
            marginBottom: theme.spacing.sm,
          },
        },
          e("label", {
            style: {
              fontSize: "0.875rem",
              fontWeight: 600,
              color: theme.colors.text,
            },
          }, label),
          e("div", { style: { display: "flex", alignItems: "baseline", gap: theme.spacing.sm } },
            e("span", {
              style: {
                fontSize: "1.25rem",
                fontWeight: 700,
                color,
                fontFamily: theme.font.mono,
              },
            }, value),
            e("span", {
              style: { fontSize: "0.75rem", color: theme.colors.textMuted },
            }, unit),
            e("span", {
              style: {
                fontSize: "0.75rem",
                color: theme.colors.textDim,
                marginLeft: theme.spacing.xs,
              },
            }, `(${calContribution} cal)`)
          )
        ),
        e("input", {
          type: "range",
          min,
          max,
          step,
          value,
          onChange: (ev) => onChange(Number(ev.target.value)),
          style: {
            width: "100%",
            accentColor: color,
            height: "6px",
            cursor: "pointer",
          },
        })
      );
    }

    /* ── Main App ───────────────────────────────────────────────────── */

    function MacroSetterApp() {
      const data = getViewData();
      const defaults = data.current_targets || {};

      const [protein, setProtein] = useState(defaults.protein_g || 150);
      const [carbs, setCarbs] = useState(defaults.carbs_g || 200);
      const [fat, setFat] = useState(defaults.fat_g || 65);
      const [saved, setSaved] = useState(false);

      const totalCalories = Math.round(protein * 4 + carbs * 4 + fat * 9);

      const handleSave = useCallback(() => {
        const payload = {
          action: "save_macro_targets",
          protein_g: protein,
          carbs_g: carbs,
          fat_g: fat,
          calories: totalCalories,
        };
        sendResult(payload);
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      }, [protein, carbs, fat, totalCalories]);

      return e("div", { className: "view-container" },
        e("style", null, sharedCSS),

        e("div", { className: "view-header" },
          e("h1", null, "Macro Targets"),
          e("p", null, "Adjust your daily macro goals and see calorie impact in real time.")
        ),

        e("div", {
          style: {
            display: "grid",
            gridTemplateColumns: "1fr 240px",
            gap: theme.spacing.xl,
            alignItems: "start",
          },
        },
          // Left: Sliders
          e(Card, null,
            e(MacroSlider, {
              label: "Protein",
              value: protein,
              min: 50,
              max: 350,
              step: 5,
              color: theme.colors.protein,
              unit: "g",
              calPer: 4,
              onChange: setProtein,
            }),
            e(MacroSlider, {
              label: "Carbohydrates",
              value: carbs,
              min: 50,
              max: 500,
              step: 5,
              color: theme.colors.carbs,
              unit: "g",
              calPer: 4,
              onChange: setCarbs,
            }),
            e(MacroSlider, {
              label: "Fat",
              value: fat,
              min: 20,
              max: 200,
              step: 5,
              color: theme.colors.fat,
              unit: "g",
              calPer: 9,
              onChange: setFat,
            })
          ),

          // Right: Pie chart
          e(Card, {
            style: {
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: theme.spacing.md,
            },
          },
            e(MacroPieChart, { protein, carbs, fat }),
            e("div", {
              style: {
                display: "flex",
                gap: theme.spacing.md,
                fontSize: "0.75rem",
              },
            },
              e("div", { style: { display: "flex", alignItems: "center", gap: "4px" } },
                e("div", { style: { width: 8, height: 8, borderRadius: "50%", background: theme.colors.protein } }),
                "Protein"
              ),
              e("div", { style: { display: "flex", alignItems: "center", gap: "4px" } },
                e("div", { style: { width: 8, height: 8, borderRadius: "50%", background: theme.colors.carbs } }),
                "Carbs"
              ),
              e("div", { style: { display: "flex", alignItems: "center", gap: "4px" } },
                e("div", { style: { width: 8, height: 8, borderRadius: "50%", background: theme.colors.fat } }),
                "Fat"
              )
            )
          )
        ),

        // Save button
        e("div", {
          style: {
            marginTop: theme.spacing.xl,
            display: "flex",
            justifyContent: "flex-end",
            gap: theme.spacing.md,
          },
        },
          e(Button, {
            variant: "secondary",
            onClick: () => {
              setProtein(defaults.protein_g || 150);
              setCarbs(defaults.carbs_g || 200);
              setFat(defaults.fat_g || 65);
            },
          }, "Reset"),
          e(Button, {
            onClick: handleSave,
            style: saved ? { background: theme.colors.success } : {},
          }, saved ? "Saved!" : "Save Targets")
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      e(MacroSetterApp)
    );
  </script>
</body>
</html>

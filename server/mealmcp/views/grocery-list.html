<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grocery List — MealMCP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <script id="view-data" type="application/json">{}</script>
  <script src="shared.js"></script>

  <div id="root"></div>

  <script>
    const { useState, useMemo, useCallback } = React;

    /* ── Category Header ────────────────────────────────────────────── */

    function CategoryHeader({ name, count, checkedCount }) {
      const allChecked = checkedCount === count;

      return e("div", {
        style: {
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
          padding: `${theme.spacing.sm} 0`,
          marginTop: theme.spacing.md,
          borderBottom: `1px solid ${theme.colors.border}`,
        },
      },
        e("h2", {
          style: {
            fontSize: "0.85rem",
            fontWeight: 700,
            textTransform: "uppercase",
            letterSpacing: "0.06em",
            color: allChecked ? theme.colors.textDim : theme.colors.text,
          },
        }, name),
        e("span", {
          style: {
            fontSize: "0.75rem",
            color: theme.colors.textMuted,
            fontFamily: theme.font.mono,
          },
        }, `${checkedCount}/${count}`)
      );
    }

    /* ── Checklist Item ─────────────────────────────────────────────── */

    function ChecklistItem({ item, isChecked, onToggle }) {
      const displayQty = item.quantity
        ? `${item.quantity}${item.unit ? " " + item.unit : ""}`
        : "";

      return e("div", {
        onClick: onToggle,
        style: {
          display: "flex",
          alignItems: "center",
          gap: theme.spacing.md,
          padding: `${theme.spacing.sm} ${theme.spacing.md}`,
          borderRadius: theme.radius.sm,
          cursor: "pointer",
          transition: "background 0.1s ease",
          background: isChecked ? "transparent" : "transparent",
        },
        onMouseEnter: (ev) => {
          ev.currentTarget.style.background = theme.colors.surfaceHover;
        },
        onMouseLeave: (ev) => {
          ev.currentTarget.style.background = "transparent";
        },
      },
        // Checkbox
        e("div", {
          style: {
            width: 20,
            height: 20,
            borderRadius: theme.radius.sm,
            border: `2px solid ${isChecked ? theme.colors.success : theme.colors.border}`,
            background: isChecked ? theme.colors.successBg : "transparent",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            flexShrink: 0,
            transition: "all 0.15s ease",
          },
        },
          isChecked && e("span", {
            style: { color: theme.colors.success, fontSize: "12px" },
          }, "\u2713")
        ),

        // Item details
        e("div", { style: { flex: 1 } },
          e("span", {
            style: {
              fontSize: "0.9rem",
              color: isChecked ? theme.colors.textDim : theme.colors.text,
              textDecoration: isChecked ? "line-through" : "none",
              transition: "all 0.15s ease",
            },
          }, item.name),
          displayQty && e("span", {
            style: {
              marginLeft: theme.spacing.sm,
              fontSize: "0.8rem",
              color: theme.colors.textMuted,
              fontFamily: theme.font.mono,
            },
          }, displayQty)
        ),

        // Recipe sources
        item.recipe_sources && item.recipe_sources.length > 0 && e("div", {
          style: {
            fontSize: "0.7rem",
            color: theme.colors.textDim,
            maxWidth: "120px",
            textAlign: "right",
            lineHeight: 1.3,
          },
        }, item.recipe_sources.join(", "))
      );
    }

    /* ── Summary Bar ────────────────────────────────────────────────── */

    function SummaryBar({ total, checked }) {
      const remaining = total - checked;
      const pct = total > 0 ? (checked / total) * 100 : 0;

      return e(Card, {
        style: {
          display: "flex",
          alignItems: "center",
          gap: theme.spacing.lg,
          marginBottom: theme.spacing.lg,
        },
      },
        e("div", { style: { flex: 1 } },
          e("div", {
            style: {
              height: "6px",
              background: theme.colors.border,
              borderRadius: theme.radius.full,
              overflow: "hidden",
            },
          },
            e("div", {
              style: {
                width: `${pct}%`,
                height: "100%",
                background: pct === 100 ? theme.colors.success : theme.colors.primary,
                borderRadius: theme.radius.full,
                transition: "width 0.3s ease",
              },
            })
          ),
          e("div", {
            style: {
              fontSize: "0.75rem",
              color: theme.colors.textMuted,
              marginTop: theme.spacing.xs,
            },
          }, `${checked} of ${total} items checked off`)
        ),
        e("div", {
          style: {
            fontSize: "1.5rem",
            fontWeight: 700,
            color: remaining === 0 ? theme.colors.success : theme.colors.text,
            fontFamily: theme.font.mono,
            minWidth: "60px",
            textAlign: "center",
          },
        }, remaining === 0 ? "\u2713" : remaining)
      );
    }

    /* ── Main App ───────────────────────────────────────────────────── */

    function GroceryListApp() {
      const data = getViewData();
      const groceryData = data.grocery_list || {};
      const items = groceryData.items || [];

      const [checkedIds, setCheckedIds] = useState(new Set());

      const toggle = useCallback((idx) => {
        setCheckedIds((prev) => {
          const next = new Set(prev);
          if (next.has(idx)) next.delete(idx);
          else next.add(idx);
          return next;
        });
      }, []);

      const checkAll = useCallback((category) => {
        setCheckedIds((prev) => {
          const next = new Set(prev);
          items.forEach((item, idx) => {
            if ((item.category || "other") === category) next.add(idx);
          });
          return next;
        });
      }, [items]);

      // Group by category
      const grouped = useMemo(() => {
        const groups = {};
        items.forEach((item, idx) => {
          const cat = item.category || "other";
          if (!groups[cat]) groups[cat] = [];
          groups[cat].push({ ...item, _idx: idx });
        });
        // Sort categories alphabetically, but "other" last
        const sorted = Object.keys(groups).sort((a, b) => {
          if (a === "other") return 1;
          if (b === "other") return -1;
          return a.localeCompare(b);
        });
        return sorted.map((cat) => ({ category: cat, items: groups[cat] }));
      }, [items]);

      const handleFinalize = useCallback(() => {
        const uncheckedItems = items.filter((_, idx) => !checkedIds.has(idx));
        sendResult({
          action: "confirm_grocery_list",
          items: uncheckedItems,
          checked_off_count: checkedIds.size,
          total_count: items.length,
        });
      }, [items, checkedIds]);

      return e("div", { className: "view-container", style: { maxWidth: "700px" } },
        e("style", null, sharedCSS),

        e("div", { className: "view-header" },
          e("h1", null, "Grocery List"),
          e("p", null, "Check off items you already have. Unchecked items will be your shopping list.")
        ),

        // Summary
        e(SummaryBar, { total: items.length, checked: checkedIds.size }),

        // Grouped items
        ...grouped.map(({ category, items: catItems }) => {
          const checkedCount = catItems.filter((it) => checkedIds.has(it._idx)).length;

          return e("div", { key: category },
            e("div", {
              style: { cursor: "pointer" },
              onClick: () => {
                if (checkedCount < catItems.length) checkAll(category);
              },
            },
              e(CategoryHeader, {
                name: category,
                count: catItems.length,
                checkedCount,
              })
            ),
            ...catItems.map((item) =>
              e(ChecklistItem, {
                key: item._idx,
                item,
                isChecked: checkedIds.has(item._idx),
                onToggle: () => toggle(item._idx),
              })
            )
          );
        }),

        // Empty state
        items.length === 0 && e("div", {
          style: {
            textAlign: "center",
            padding: theme.spacing.xl,
            color: theme.colors.textMuted,
          },
        }, "No items in the grocery list."),

        // Actions
        e("div", {
          style: {
            marginTop: theme.spacing.xl,
            display: "flex",
            justifyContent: "space-between",
            alignItems: "center",
            position: "sticky",
            bottom: theme.spacing.lg,
            background: theme.colors.bg,
            padding: `${theme.spacing.md} 0`,
          },
        },
          e(Button, {
            variant: "ghost",
            onClick: () => setCheckedIds(new Set()),
          }, "Uncheck All"),
          e(Button, {
            onClick: handleFinalize,
            disabled: items.length === 0,
          },
            checkedIds.size === items.length
              ? "All Items In Pantry"
              : `Confirm List (${items.length - checkedIds.size} items)`
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      e(GroceryListApp)
    );
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Meal Plan — MealMCP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <script id="view-data" type="application/json">{}</script>
  <script src="shared.js"></script>

  <div id="root"></div>

  <script>
    const { useState, useMemo } = React;

    const DAY_NAMES = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    const DAY_SHORT = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
    const MEAL_ORDER = ["breakfast", "lunch", "dinner", "snack"];

    /* ── Macro Variance Bar ─────────────────────────────────────────── */

    function MacroVarianceBar({ actual, target, nutrient, color }) {
      if (!target || target === 0) return null;
      const pct = (actual / target) * 100;
      const isOver = pct > 105;
      const isUnder = pct < 85;
      const barColor = isOver ? theme.colors.danger : isUnder ? theme.colors.warning : color;

      return e("div", { style: { marginBottom: "4px" } },
        e("div", {
          style: {
            display: "flex",
            justifyContent: "space-between",
            fontSize: "0.65rem",
            color: theme.colors.textDim,
            marginBottom: "2px",
          },
        },
          e("span", null, nutrient),
          e("span", { style: { color: barColor, fontWeight: 600 } },
            `${Math.round(actual)}/${Math.round(target)}`)
        ),
        e("div", {
          style: {
            height: "4px",
            background: theme.colors.border,
            borderRadius: theme.radius.full,
            overflow: "hidden",
          },
        },
          e("div", {
            style: {
              width: `${Math.min(pct, 100)}%`,
              height: "100%",
              background: barColor,
              borderRadius: theme.radius.full,
              transition: "width 0.3s ease",
            },
          })
        )
      );
    }

    /* ── Meal Chip ──────────────────────────────────────────────────── */

    function MealChip({ mealType, recipes }) {
      const mealColors = {
        breakfast: theme.colors.carbs,
        lunch: theme.colors.protein,
        dinner: theme.colors.primary,
        snack: theme.colors.textMuted,
      };
      const color = mealColors[mealType] || theme.colors.textMuted;

      return e("div", {
        style: {
          padding: `${theme.spacing.xs} ${theme.spacing.sm}`,
          background: `${color}12`,
          borderRadius: theme.radius.sm,
          borderLeft: `3px solid ${color}`,
          marginBottom: "4px",
        },
      },
        e("div", {
          style: {
            fontSize: "0.65rem",
            fontWeight: 600,
            textTransform: "uppercase",
            letterSpacing: "0.05em",
            color,
            marginBottom: "2px",
          },
        }, mealType),
        ...recipes.map((r, i) =>
          e("div", {
            key: i,
            style: {
              fontSize: "0.8rem",
              color: theme.colors.text,
              lineHeight: 1.3,
            },
          }, r.recipe_name || r.recipe_id)
        )
      );
    }

    /* ── Day Column ─────────────────────────────────────────────────── */

    function DayColumn({ dayOffset, dayData, targets, onAction }) {
      const dayName = DAY_SHORT[dayOffset % 7] || `Day ${dayOffset + 1}`;
      const meals = dayData.meals || {};
      const macros = dayData.member_macros || {};
      const firstMemberMacros = Object.values(macros)[0] || {};
      const isEmpty = Object.keys(meals).length === 0;

      const isToday = false; // Could compare with actual date

      return e("div", {
        style: {
          background: theme.colors.surface,
          border: `1px solid ${isEmpty ? theme.colors.border : theme.colors.borderFocus + "40"}`,
          borderRadius: theme.radius.md,
          padding: theme.spacing.md,
          minHeight: "280px",
          display: "flex",
          flexDirection: "column",
        },
      },
        // Day header
        e("div", {
          style: {
            fontSize: "0.8rem",
            fontWeight: 700,
            color: isToday ? theme.colors.primary : theme.colors.text,
            marginBottom: theme.spacing.sm,
            paddingBottom: theme.spacing.sm,
            borderBottom: `1px solid ${theme.colors.border}`,
          },
        }, dayName),

        // Meals
        e("div", { style: { flex: 1, marginBottom: theme.spacing.sm } },
          isEmpty
            ? e("div", {
                style: {
                  color: theme.colors.textDim,
                  fontSize: "0.8rem",
                  textAlign: "center",
                  padding: theme.spacing.lg,
                },
              }, "No meals")
            : MEAL_ORDER
                .filter((mt) => meals[mt] && meals[mt].length > 0)
                .map((mt) =>
                  e(MealChip, {
                    key: mt,
                    mealType: mt,
                    recipes: meals[mt],
                  })
                )
        ),

        // Variance bars (shown when we have macros and targets)
        targets && firstMemberMacros.calories != null && e("div", {
          style: { marginTop: "auto" },
        },
          e(MacroVarianceBar, {
            actual: firstMemberMacros.calories || 0,
            target: targets.calories,
            nutrient: "Cal",
            color: theme.colors.calories,
          }),
          e(MacroVarianceBar, {
            actual: firstMemberMacros.protein_g || 0,
            target: targets.protein_g,
            nutrient: "Protein",
            color: theme.colors.protein,
          }),
          e(MacroVarianceBar, {
            actual: firstMemberMacros.carbs_g || 0,
            target: targets.carbs_g,
            nutrient: "Carbs",
            color: theme.colors.carbs,
          }),
          e(MacroVarianceBar, {
            actual: firstMemberMacros.fat_g || 0,
            target: targets.fat_g,
            nutrient: "Fat",
            color: theme.colors.fat,
          })
        )
      );
    }

    /* ── Action Toolbar ─────────────────────────────────────────────── */

    function ActionToolbar({ planId, hasEmptySlots, onAction }) {
      return e("div", {
        style: {
          display: "flex",
          gap: theme.spacing.md,
          flexWrap: "wrap",
        },
      },
        hasEmptySlots && e(Button, {
          onClick: () => {
            sendResult({ action: "optimize_empty_slots", plan_id: planId });
            onAction("optimizing");
          },
        }, "Optimize Empty Slots"),
        e(Button, {
          variant: "secondary",
          onClick: () => {
            sendResult({ action: "rebalance_plan", plan_id: planId });
            onAction("rebalancing");
          },
        }, "Rebalance Plan"),
        e(Button, {
          variant: "ghost",
          onClick: () => {
            sendResult({ action: "refresh_plan", plan_id: planId });
            onAction("refreshing");
          },
        }, "Refresh")
      );
    }

    /* ── Weekly Summary Row ─────────────────────────────────────────── */

    function WeeklySummary({ weeklyAverages, targets }) {
      if (!weeklyAverages || Object.keys(weeklyAverages).length === 0) return null;
      const avg = Object.values(weeklyAverages)[0];
      if (!avg) return null;

      return e(Card, {
        style: { marginBottom: theme.spacing.lg },
      },
        e("div", {
          style: {
            fontSize: "0.8rem",
            fontWeight: 600,
            color: theme.colors.textMuted,
            marginBottom: theme.spacing.sm,
          },
        }, "Weekly Average"),
        e("div", {
          style: { display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: theme.spacing.md },
        },
          e(ProgressBar, {
            value: avg.calories || 0,
            max: targets ? targets.calories : avg.calories,
            color: theme.colors.calories,
            label: "Calories",
          }),
          e(ProgressBar, {
            value: avg.protein_g || 0,
            max: targets ? targets.protein_g : avg.protein_g,
            color: theme.colors.protein,
            label: "Protein",
          }),
          e(ProgressBar, {
            value: avg.carbs_g || 0,
            max: targets ? targets.carbs_g : avg.carbs_g,
            color: theme.colors.carbs,
            label: "Carbs",
          }),
          e(ProgressBar, {
            value: avg.fat_g || 0,
            max: targets ? targets.fat_g : avg.fat_g,
            color: theme.colors.fat,
            label: "Fat",
          })
        )
      );
    }

    /* ── Main App ───────────────────────────────────────────────────── */

    function WeeklyCalendarApp() {
      const data = getViewData();
      const planSummary = data.plan_summary || {};
      const targets = data.targets || null;

      const dailySummaries = planSummary.daily_summaries || [];
      const weeklyAverages = planSummary.weekly_averages || {};
      const planName = planSummary.plan_name || "Meal Plan";
      const planId = planSummary.plan_id || "";
      const totalDays = planSummary.days || 7;

      const [actionStatus, setActionStatus] = useState(null);

      // Build array of days (0..totalDays-1), filling missing days with empty
      const days = useMemo(() => {
        const dayMap = {};
        dailySummaries.forEach((ds) => {
          dayMap[ds.day_offset] = ds;
        });
        return Array.from({ length: totalDays }, (_, i) =>
          dayMap[i] || { day_offset: i, meals: {}, member_macros: {} }
        );
      }, [dailySummaries, totalDays]);

      const hasEmptySlots = days.some(
        (d) => !d.meals || Object.keys(d.meals).length === 0
      );

      return e("div", { className: "view-container", style: { maxWidth: "1200px" } },
        e("style", null, sharedCSS),

        e("div", { className: "view-header" },
          e("h1", null, planName),
          e("p", null, `${totalDays}-day plan overview`)
        ),

        // Weekly summary
        e(WeeklySummary, { weeklyAverages, targets }),

        // Calendar grid
        e("div", {
          style: {
            display: "grid",
            gridTemplateColumns: `repeat(${Math.min(totalDays, 7)}, 1fr)`,
            gap: theme.spacing.sm,
            marginBottom: theme.spacing.xl,
          },
        },
          ...days.map((day) =>
            e(DayColumn, {
              key: day.day_offset,
              dayOffset: day.day_offset,
              dayData: day,
              targets,
            })
          )
        ),

        // Actions
        e(ActionToolbar, {
          planId,
          hasEmptySlots,
          onAction: setActionStatus,
        }),

        actionStatus && e("div", {
          style: {
            marginTop: theme.spacing.md,
            fontSize: "0.85rem",
            color: theme.colors.primary,
          },
        }, `Status: ${actionStatus}...`)
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      e(WeeklyCalendarApp)
    );
  </script>
</body>
</html>
